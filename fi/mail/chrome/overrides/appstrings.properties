malformedURI2 = Tarkista, että osoite on oikea ja yritä uudelleen.
fileNotFound = Tiedostoa %S ei löytynyt. Tarkista sen sijainti ja yritä uudelleen.
fileAccessDenied = Tiedosto %S ei ole luettavissa.
# %S is replaced by the uri host
httpErrorPage = %S lähetti takaisin virheen.
serverError = %S saattaa kärsiä tilapäisestä ongelmasta tai se on voitu siirtää.
dnsNotFound2 = %S ei löytynyt. Tarkista nimi ja yritä uudelleen.
basicHttpAuthDisabled = Tähän sisältöön hyökännyt taho saattaa yrittää tekeytyä luotettavaksi ja varastaa henkilötietojasi, kuten käyttäjätunnuksesi, salasanasi tai sähköpostiosoittteesi. Myös yhteysasetuksesi on saatettu määritettää väärin.
unknownProtocolFound = Jokin seuraavista (%S) ei ole rekisteröity yhteyskäytäntö, tai sitä ei ole sallittua käyttää tällä tavalla.
netTimeout = Yhteyden muodostus osoitteeseen %S aikakatkaistiin.
redirectLoop = Tämän osoitteen uudelleenohjausrajoitus ylittyi. Pyydettyä sisältöä ei voida ladata. Syynä voivat olla estetyt evästeet.
confirmRepostPrompt = Sisältö voidaan näyttää vain lähettämällä Thunderbirdin jo aikaisemmin lähettämät tiedot. Tietojen lähettäminen toistaa aikaisemmin suoritetun toiminnon (kuten haun tai tuotteen tilauksen verkkokaupasta).
resendButton.label = Lähetä uudestaan
clientSocketMisconfiguration = Thunderbird ei osaa keskustella palvelimen kanssa.
unknownSocketType = Tätä tiedostoa ei voida avata, ellet asenna Henkilökohtaista turvallisuuden hallintaa (PSM). Lataa ja asenna PSM ja yritä uudelleen tai ota yhteyttä järjestelmänvalvojaasi.
netOffline = Thunderbird on tällä hetkellä yhteydettömässä tilassa, eikä yhteyttä Internetiin ole mahdollista muodostaa.
deniedPortAccess = Pääsy pyydettyyn porttiin on estetty turvallisuussyistä.
proxyResolveFailure = Välityspalvelinta ei löytynyt. Tarkista välityspalvelinasetukset ja yritä uudelleen.
proxyConnectFailure = Välityspalvelin kieltäytyi muodostamasta yhteyttä. Tarkista välityspalvelinasetukset ja yritä uudelleen.
contentEncodingError = Avattava sisältö on pakattu virheellisesti tai tuntemattomalla tavalla, joten sitä ei voida näyttää.
malwareBlocked = Palvelinta %S on ilmoitettu käytettävän hyökkäyksiin, ja sen avaaminen on estetty turvallisuusasetustesi perusteella.
harmfulBlocked = Osoitteessaa %S olevan sisällön on ilmoitettu olevan mahdollisesti haitallista, ja sen avaaminen on estetty turvallisuusasetustesi perusteella.
unwantedBlocked = Palvelimen %S on ilmoitettu yrittävän asentaa ohjelmistoja pyytämättä, ja sen avaaminen on estetty turvallisuusasetustesi perusteella.
deceptiveBlocked = Osoitteesa %S olevan sisällön on ilmoitettu olen harhaanjohtavaa, ja sen avaaminen on estetty turvallisuusasetustesi perusteella.
cspBlocked = Tällä sivulla on sisällön tietosuojakäytäntö, joka estää sen lataamisen tällä tavalla.
xfoBlocked = Tällä sivulla on X-Frame-Options-käytäntö, joka estää sen lataamisen tässä yhteydessä.
corruptedContentErrorv2 = Palvelin %S on kohdannut yhteyskäytöntövirheen, josta ei voi toipua.
sslv3Used = Tietojesi turvallisuutta palvelimella %S ei voida taata, koska se käyttää rikkoutunutta turvallisuuskäytäntöä, SSLv3:a.
weakCryptoUsed = Palvelimen %S omistaja on määrittänyt palvelimensa asetukset väärin. Palvelimeen ei muodostettu yhteyttä suojellaksemme tietojasi varkaudelta.
inadequateSecurityError = Palvelin yritti käyttää riittämätöntä suojaustasoa.
blockedByPolicy = Organisaatiosi on estänyt pääsyn tähän sisältöön.
blockedByCORP = Tätä sisältöä ei ladattu, koska sen tietosuoja-asetukset eivät näytä vastaavan edellistä pyyntöä.
invalidHeaderValue = %S lähetti takaisin tyhjiä merkkejä sisältävän otsakkeen; verkkoturvastandardit eivät salli sitä.
networkProtocolError = Thunderbird on kohdannut yhteyskäytäntövirheen, josta ei voi toipua.
