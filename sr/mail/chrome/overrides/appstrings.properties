malformedURI2 = Проверите да ли је адреса исправна и покушајте поново.
fileNotFound = Датотека %S не може бити пронађена. Проверите место и покушајте поново.
fileAccessDenied = Датотека на %S није читљива.
# %S is replaced by the uri host
httpErrorPage = %S је вратио грешку.
serverError = %S можда има привремени проблем или је премештен.
dnsNotFound2 = %S не може бити пронађен. Проверите назив и покушајте поново.
basicHttpAuthDisabled = Неко можда покушава да лажира садржај и украде ваше податке попут корисничког имена, лозинке или е-поште. Ваше поставке везе такође могу бити погрешно подешене.
unknownProtocolFound = Један од следећих (%S) није регистрован протокол или није дозвољен у овом контексту.
connectionFailure = Веза је одбијена приликом покушаја повезивања са %S.
netInterrupt = Веза са %S је неочекивано прекинута. Неки подаци су можда пренесени.
netTimeout = Време за радњу је истекло приликом покушаја повезивања са %S.
redirectLoop = Ограничење преусмеравања за ову адресу је прекорачено. Не могу да учитам тражени садржај. Ово могу узроковати блокирани колачићи.
confirmRepostPrompt = Да би приказао овај садржај, Thunderbird мора послати податке који ће поновити сваку радњу (попут претраге или потврде поруџбине) која је раније извршена.
resendButton.label = Пошаљи поново
clientSocketMisconfiguration = Thunderbird не зна како да комуницира са сервером.
unknownSocketType = Овај документ не може бити приказан осим ако не инсталирате Управника личне безбедности (PSM). Преузмите и инсталирате PSM и покушајте поново, или контактирајте вашег администратора система.
netReset = Документ не садржи податке.
notCached = Овај документ више није доступан.
netOffline = Thunderbird је тренутно у режиму ван мреже и не може се повезати на интернет.
isprinting = Документ се не може мењати током штампања или у прегледу пре штампе.
deniedPortAccess = Приступ наведеном броју прикључка је онемогућен из безбедносних разлога.
proxyResolveFailure = Подешени посреднички сервер не може бити пронађен. Проверите ваша подешавања посредника и покушајте поново.
proxyConnectFailure = Веза је одбијена приликом покушаја повезивања са подешеним посредничким сервером. Проверите ваша подешавања посредника и покушајте поново.
contentEncodingError = Садржај који покушавате да прегледате не може бити приказан јер користи неисправну или неподржану врсту сажимања.
unsafeContentType = Садржај који покушавате да прегледате не може бити приказан јер се налази у врсти датотеке која можда није безбедна за отварање. Обратите се власницима сервера како бисте их обавестили о овом проблему.
malwareBlocked = Сервер на %S је према извештајима коришћен за нападе и блокиран је на основу ваших безбедносних подешавања.
harmfulBlocked = Садржај на %S је пријављен као потенцијално штетан и блокиран је на основу ваших безбедносних подешавања.
unwantedBlocked = Сервер на %S је пријављен да нуди непожељан софтвер и блокиран је на основу ваших безбедносних подешавања.
deceptiveBlocked = Садржај на %S је пријављен као обманљив и блокиран је на основу ваших безбедносних подешавања.
cspBlocked = Ова страница има полицику безбедности садржаја која спречава њено учитавање на овај начин.
xfoBlocked = Ова страница има X-Frame-Options политику која спречава њено учитавање у овом контексту.
corruptedContentErrorv2 = Сервер на %S је доживео нарушавање мрежног протокола које се не може поправити.
sslv3Used = Безбедност ваших података на %S не може бити загарантована јер користи SSLv3, застарели безбедносни протокол.
weakCryptoUsed = Власник %S је неправилно подесио свој сервер. Како бисте заштитили своје податке од крађе, веза са овим сервером није успостављена.
inadequateSecurityError = Сервер је покушао да уговори неодговарајући ниво безбедности.
blockedByPolicy = Ваша организација је блокирала приступ овом садржају.
blockedByCORP = Овај садржај није учитан јер изгледа да се безбедносно подешавање не поклапа са претходним захтевом.
invalidHeaderValue = %S је вратио заглавље са празним знаковима који нису дозвољени према веб безбедносним стандардима.
networkProtocolError = Thunderbird је доживео нарушавање мрежног протокола које се не може поправити.
