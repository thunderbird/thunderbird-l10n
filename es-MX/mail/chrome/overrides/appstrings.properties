malformedURI2 = Por favor, revisa que la URL sea correcta y vuelve a intentarlo.
fileNotFound = No se puede encontrar el archivo %S. Verifica la ubicación e intenta de nuevo.
fileAccessDenied = No se puede leer el archivo en %S.
# %S is replaced by the uri host
httpErrorPage = %S devolvió un error.
serverError = Es posible que %S tenga un problema temporal o que se haya movido.
dnsNotFound2 = No se pudo encontrar %S. Verifica el nombre e intenta de nuevo.
basicHttpAuthDisabled = Alguien podría estar suplantando el contenido e intentar el robo de datos como el nombre de usuario, la contraseña o el correo electrónico. También es posible que la configuración de la conexión sea incorrecta.
unknownProtocolFound = Uno de los protocolos (%S) no está registrado o no se permite en este contexto.
connectionFailure = Se rechazó la conexión al intentar contactar con %S.
netInterrupt = La conexión con %S terminó de forma inesperada. Es posible que se hayan transferido algunos datos.
netTimeout = Se agotó el tiempo de espera de la operación al intentar contactar con %S.
redirectLoop = Se excedió el límite de redireccionamientos para esta URL. No se puede cargar el contenido solicitado. Esto podría deberse a que las cookies están bloqueadas.
confirmRepostPrompt = Para mostrar este contenido, Thunderbird debe enviar información que repetirá cualquier acción realizada anteriormente (como una búsqueda o una confirmación de pedido).
resendButton.label = Reenviar
clientSocketMisconfiguration = Thunderbird no puede comunicarse con el servidor.
unknownSocketType = Este documento no se puede mostrar a menos que se instale el Administrador de Seguridad Personal (PSM). Descarga e instala el PSM e intenta de nuevo, o contacta a la administración del sistema.
netReset = El documento no contiene datos.
notCached = Este documento ya no está disponible.
netOffline = Thunderbird está actualmente en modo desconectado y no puede conectarse a internet.
isprinting = El documento no se puede modificar mientras se está imprimiendo o en la vista previa de impresión.
deniedPortAccess = Por razones de seguridad, se ha cerrado el acceso a este puerto.
proxyResolveFailure = No se encontró el servidor Proxy registrado. Revisa tu configuración e inténtalo nuevamente.
proxyConnectFailure = La conexión se rechazó al intentar conectarse al servidor Proxy registrado. Revisa tu configuración e intenta nuevamente.
contentEncodingError = El contenido que intentas visualizar no se puede mostrar porque utiliza un método de compresión no válido o no compatible.
unsafeContentType = El contenido que intentas visualizar no se puede mostrar porque está en un tipo de archivo que podría no ser seguro abrir. Ponte en contacto con los administradores del servidor para informarles de este problema.
malwareBlocked = Se reportó que el servidor en %S ha sido utilizado para ataques y se bloqueó según tu configuración de seguridad.
